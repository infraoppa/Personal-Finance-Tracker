<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">

        <meta
            name="viewport"
            content="width=device-width, initial-scale=1"
        >

        <title>Edit Transaction</title>
    </head>

    <body>
        <h1>Edit Transaction</h1>

        <form
            action="/transactions/{{ transaction.id }}/edit"
            method="post"
        >
            <div>
                <label for="amount">Amount</label>

                <input
                    type="number"
                    id="amount"
                    name="amount"
                    step="0.01"
                    min="0.01"
                    value="{{ transaction.amount }}"
                    required
                >
            </div>

            <div>
                <label for="category">Category</label>

                <input
                    type="text"
                    id="category"
                    name="category"
                    value="{{ transaction.category }}"
                    required
                >
            </div>

            <div>
                <label for="description">Description</label>

                <input
                    type="text"
                    id="description"
                    name="description"
                    value="{{ transaction.description }}"
                    required
                >
            </div>

            <div>
                <label for="transaction_date">
                    Transaction Date
                </label>

                <input
                    type="date"
                    id="transaction_date"
                    name="transaction_date"
                    value="{{ transaction.transaction_date }}"
                    required
                >
            </div>

            <button type="submit">
                Save Changes
            </button>
        </form>

        <a href="/dashboard">Cancel</a>
    </body>
</html>
